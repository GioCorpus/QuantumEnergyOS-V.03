UI menu.c32
PROMPT 0
MENU TITLE QuantumEnergyOS V.02 — OVERDRIVE EDITION
TIMEOUT 80
DEFAULT quantum

MENU COLOR border       30;44   #00000000 #00000000 none
MENU COLOR title        1;36    #00d4ff   #00000000 none
MENU COLOR unsel        37;40   #c0c0c0   #00000000 none
MENU COLOR sel          1;37;43  #ffffff   #ff8800   none
MENU COLOR hotsel       1;37;43  #ff8800   #00000000 none
MENU COLOR timeout_msg  37;40   #808080   #00000000 none
MENU COLOR cmdmark      1;36    #00d4ff   #00000000 none

LABEL quantum
    MENU LABEL ⚡ QUANTUMENERGYOS — OVERDRIVE
    LINUX boot/x86_64/vmlinuz-linux
    INITRD boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=QEOS_V02 quiet splash vt.default_utf8=1

LABEL safe
    MENU LABEL ⚠️ Modo Seguro (sin overdrive)
    LINUX boot/x86_64/vmlinuz-linux
    INITRD boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=QEOS_V02 quiet splash vt.default_utf8=1 nomodeset

LABEL reboot
    MENU LABEL Reiniciar
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Apagar
    COM32 poweroff.c32
