UI menu.c32
PROMPT 0
MENU TITLE QuantumEnergyOS V.02 — Arch Linux + Wayland
TIMEOUT 100
DEFAULT arch

LABEL arch
    MENU LABEL ⚡ QuantumEnergyOS V.02 — Iniciar
    LINUX boot/x86_64/vmlinuz-linux
    INITRD boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=QEOS_V02 quiet splash

LABEL archfallback
    MENU LABEL ⚡ QuantumEnergyOS V.02 — Modo seguro
    LINUX boot/x86_64/vmlinuz-linux
    INITRD boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=QEOS_V02

LABEL reboot
    MENU LABEL Reiniciar
    COM32 reboot.c32

LABEL poweroff
    MENU LABEL Apagar
    COM32 poweroff.c32
