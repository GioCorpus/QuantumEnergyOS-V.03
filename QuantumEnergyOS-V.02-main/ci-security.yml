name: Security Scan

on:
  push:
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: pip install pip-audit bandit
      - name: Dependency Audit
        run: pip-audit --strict
      - name: Static Code Analysis
        run: bandit -r . -ll

