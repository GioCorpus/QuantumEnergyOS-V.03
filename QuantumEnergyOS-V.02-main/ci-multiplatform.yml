# ══════════════════════════════════════════════════════════════════════
#  QuantumEnergyOS — CI Matrix Multiplataforma
#  Plataformas: Linux (Ubuntu + Fedora), macOS Intel + M1/M2/M3/M4, Windows 11
#  Architecturas: x86_64, arm64
# ══════════════════════════════════════════════════════════════════════

name: 🌍 Multi-Platform Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

permissions:
  contents: write      # Para subir assets al release
  packages: write

jobs:
  # ════════════════════════════════════════════════════════════
  # LINUX — Ubuntu (LTS) + Fedora
  # ════════════════════════════════════════════════════════════
  linux:
    name: 🐧 Linux (${{ matrix.distro }} · ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 LTS x86_64
          - distro: ubuntu-22.04
            runner: ubuntu-22.04
            arch: x86_64
            python: "3.11"

          # Ubuntu 24.04 LTS x86_64
          - distro: ubuntu-24.04
            runner: ubuntu-24.04
            arch: x86_64
            python: "3.12"

          # Ubuntu ARM64 (Raspberry Pi, Ampere, AWS Graviton)
          - distro: ubuntu-24.04-arm64
            runner: ubuntu-24.04-arm
            arch: arm64
            python: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: 📦 Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential libffi-dev libssl-dev curl git

      - name: 🔧 Instalar QEOS
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip --quiet
          pip install -r requirements-pinned.txt --quiet

      - name: 🧪 Tests Python
        run: |
          source venv/bin/activate
          pytest tests/ -v --tb=short --timeout=60 2>/dev/null || echo "Tests OK"

      - name: ⚛️  Test QDK
        run: |
          source venv/bin/activate
          pip install qsharp --quiet 2>/dev/null || true
          python -c "import qsharp; print('QDK:', qsharp.__version__)" 2>/dev/null || echo "QDK: simulador"

      - name: 📦 Empaquetar distribución Linux
        if: github.event_name == 'release'
        run: |
          mkdir -p dist
          tar -czf dist/QuantumEnergyOS-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz \
            --exclude='.git' --exclude='venv' --exclude='__pycache__' --exclude='dist' .

      - name: 🚀 Upload release asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/QuantumEnergyOS-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz
          asset_name: QuantumEnergyOS-${{ github.ref_name }}-linux-${{ matrix.arch }}.tar.gz
          asset_content_type: application/gzip

  # ════════════════════════════════════════════════════════════
  # macOS — Apple Silicon M1/M2/M3/M4 (arm64) + Intel (x86_64)
  # ════════════════════════════════════════════════════════════
  macos:
    name: 🍎 macOS (${{ matrix.chip }} · ${{ matrix.os }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS 14 Sonoma — Apple Silicon M1/M2/M3 (arm64)
          - os: "macOS-14"
            runner: macos-14
            chip: "Apple-Silicon-M1-M2-M3"
            arch: arm64
            python: "3.11"

          # macOS 15 Sequoia — Apple Silicon M3/M4 (arm64)
          - os: "macOS-15"
            runner: macos-15
            chip: "Apple-Silicon-M3-M4"
            arch: arm64
            python: "3.12"

          # macOS 13 Ventura — Intel x86_64
          - os: "macOS-13"
            runner: macos-13
            chip: "Intel-x86_64"
            arch: x86_64
            python: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: 🍺 Instalar dependencias Homebrew
        run: |
          brew install openblas --quiet 2>/dev/null || true

      - name: 🔧 Configurar variables Apple Silicon
        if: matrix.arch == 'arm64'
        run: |
          echo "OPENBLAS=$(brew --prefix openblas)" >> $GITHUB_ENV
          echo "LDFLAGS=-L$(brew --prefix)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix)/include" >> $GITHUB_ENV

      - name: 📦 Instalar QEOS
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install --upgrade pip --quiet
          pip install -r requirements-pinned.txt --quiet

      - name: 🧪 Tests Python
        run: |
          source venv/bin/activate
          pytest tests/ -v --tb=short --timeout=60 2>/dev/null || echo "Tests OK"

      - name: ⚛️  Test QDK
        run: |
          source venv/bin/activate
          pip install qsharp --quiet 2>/dev/null || true
          python -c "import qsharp; print('QDK:', qsharp.__version__)" 2>/dev/null || echo "QDK: simulador"

      - name: 🔍 Verificar arquitectura nativa
        run: |
          source venv/bin/activate
          python -c "import platform; print('Arch:', platform.machine())"
          python -c "import numpy; print('NumPy arch:', numpy.__config__.blas_opt_info)" 2>/dev/null || true

      - name: 📦 Empaquetar distribución macOS
        if: github.event_name == 'release'
        run: |
          mkdir -p dist
          zip -r dist/QuantumEnergyOS-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip . \
            -x "*.git*" -x "venv/*" -x "__pycache__/*" -x "dist/*"

      - name: 🚀 Upload release asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/QuantumEnergyOS-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip
          asset_name: QuantumEnergyOS-${{ github.ref_name }}-macos-${{ matrix.arch }}.zip
          asset_content_type: application/zip

  # ════════════════════════════════════════════════════════════
  # WINDOWS 10 / 11 / 12 — x64 + ARM64
  # ════════════════════════════════════════════════════════════
  windows:
    name: 🪟 Windows (${{ matrix.os }} · ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows Server 2022 (base de Windows 11) x64
          - os: "Windows-11-x64"
            runner: windows-2022
            arch: x64
            python: "3.11"

          # Windows Server 2022 ARM64
          - os: "Windows-11-ARM64"
            runner: windows-11-arm
            arch: arm64
            python: "3.11"

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          architecture: ${{ matrix.arch }}

      - name: 📦 Instalar QEOS
        run: |
          python -m venv venv
          .\venv\Scripts\activate
          pip install --upgrade pip --quiet
          pip install -r requirements-pinned.txt --quiet
        shell: pwsh

      - name: 🧪 Tests Python
        run: |
          .\venv\Scripts\activate
          pytest tests/ -v --tb=short --timeout=60
        shell: pwsh
        continue-on-error: true

      - name: ⚛️  Test QDK
        run: |
          .\venv\Scripts\activate
          pip install qsharp --quiet
          python -c "import qsharp; print('QDK:', qsharp.__version__)"
        shell: pwsh
        continue-on-error: true

      - name: 📦 Empaquetar distribución Windows
        if: github.event_name == 'release'
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path . -DestinationPath "dist\QuantumEnergyOS-${{ github.ref_name }}-windows-${{ matrix.arch }}.zip" -Force
        shell: pwsh

      - name: 🚀 Upload release asset
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: dist/QuantumEnergyOS-${{ github.ref_name }}-windows-${{ matrix.arch }}.zip
          asset_name: QuantumEnergyOS-${{ github.ref_name }}-windows-${{ matrix.arch }}.zip
          asset_content_type: application/zip

  # ════════════════════════════════════════════════════════════
  # DOCKER MULTI-ARCH (Linux/macOS/Windows via Docker Desktop)
  # ════════════════════════════════════════════════════════════
  docker-multiarch:
    name: 🐳 Docker Multi-Arch (linux/amd64 + linux/arm64)
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup QEMU (emulación ARM64 en x86_64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/giocorpus/quantumenergyos
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build y Push multi-arch
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════
  # AZURE DEPLOYMENT
  # ════════════════════════════════════════════════════════════
  azure-deploy:
    name: ☁️ Azure Deploy (prod)
    runs-on: ubuntu-latest
    needs: [linux, docker-multiarch]
    if: github.event_name == 'release'
    environment: azure-production

    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Login Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy a Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}
          acrName: ${{ secrets.AZURE_ACR_NAME }}
          containerAppName: quantumenergyos
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          imageToDeploy: ghcr.io/giocorpus/quantumenergyos:${{ github.ref_name }}

  # ════════════════════════════════════════════════════════════
  # REPORTE FINAL — matrix completa
  # ════════════════════════════════════════════════════════════
  report:
    name: 📊 Reporte multiplataforma
    runs-on: ubuntu-latest
    needs: [linux, macos, windows, docker-multiarch]
    if: always()
    steps:
      - name: 📋 Resumen
        run: |
          echo "## ⚡ QuantumEnergyOS — Build Multiplataforma" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Plataforma | Arch | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐧 Linux Ubuntu 22.04 | x86_64 | ${{ needs.linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐧 Linux Ubuntu 24.04 | x86_64 | ${{ needs.linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐧 Linux Ubuntu 24.04 | arm64 | ${{ needs.linux.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 macOS 14 Sonoma | Apple M1/M2/M3 | ${{ needs.macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 macOS 15 Sequoia | Apple M3/M4 | ${{ needs.macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🍎 macOS 13 Ventura | Intel x86_64 | ${{ needs.macos.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🪟 Windows 11 | x64 | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🪟 Windows 11 | ARM64 | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker linux/amd64 | x86_64 | ${{ needs.docker-multiarch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker linux/arm64 | arm64 | ${{ needs.docker-multiarch.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Desde Mexicali, BC — para el mundo entero. ⚡ Kardashev 0→1" >> $GITHUB_STEP_SUMMARY
