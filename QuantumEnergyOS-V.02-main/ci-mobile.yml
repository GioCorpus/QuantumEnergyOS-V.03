# ═══════════════════════════════════════════════════════════════════════
#  QuantumEnergyOS Mobile — CI Build iOS + Android
#  Compila la app Tauri para ambas plataformas en cada PR/push.
# ═══════════════════════════════════════════════════════════════════════

name: 📱 Mobile Build (iOS + Android)

on:
  push:
    branches: [main]
    paths: ["src/**", "src-tauri/**", "package.json"]
  pull_request:
    branches: [main]
  release:
    types: [created]

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Android APK / AAB
  # ─────────────────────────────────────────────────────────────────
  android:
    name: 🤖 Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🐍 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🦀 Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: 📦 Instalar dependencias Node
        run: npm ci

      - name: 🔧 Setup Android NDK
        run: |
          echo "NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_ROOT" >> $GITHUB_ENV

      - name: 🏗️ Build Android (debug)
        run: |
          npx tauri android build --debug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 📦 Upload APK debug
        uses: actions/upload-artifact@v4
        with:
          name: qeos-android-debug
          path: src-tauri/gen/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: 🏗️ Build Android (release) — solo en release tag
        if: github.event_name == 'release'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          npx tauri android build \
            --apk \
            -- \
            -P android.releaseSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -P android.releaseSigningKeyPassword="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -P android.releaseSigningStoreFile="../../../../keystore.jks" \
            -P android.releaseSigningStorePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"

      - name: 🚀 Upload release APK
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
          asset_name: QuantumEnergyOS-${{ github.ref_name }}-android.apk
          asset_content_type: application/vnd.android.package-archive

  # ─────────────────────────────────────────────────────────────────
  # iOS IPA (solo en macOS runner — requiere Xcode)
  # ─────────────────────────────────────────────────────────────────
  ios:
    name: 🍎 iOS Build
    runs-on: macos-15   # macOS 15 Sequoia — Xcode 16, Apple M3/M4

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 🦀 Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: 📦 Instalar dependencias Node
        run: npm ci

      - name: 📲 Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🔧 Instalar CocoaPods
        run: sudo gem install cocoapods

      - name: 🏗️ Init iOS (genera el proyecto Xcode)
        run: npx tauri ios init

      - name: 🏗️ Build iOS simulator (debug)
        run: |
          npx tauri ios build \
            --debug \
            --target aarch64-apple-ios-sim

      - name: 📦 Upload iOS simulator build
        uses: actions/upload-artifact@v4
        with:
          name: qeos-ios-simulator-debug
          path: src-tauri/gen/apple/build/Debug-iphonesimulator/*.app
          retention-days: 14

      - name: 🏗️ Build iOS device (release) — solo en release tag
        if: github.event_name == 'release'
        run: |
          # Requiere certificados de firma en GitHub Secrets
          npx tauri ios build \
            --target aarch64-apple-ios
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE:      ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}

  # ─────────────────────────────────────────────────────────────────
  # Tests Rust del core cuántico (en todas las plataformas)
  # ─────────────────────────────────────────────────────────────────
  rust-tests:
    name: 🦀 Rust Core Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 🦀 Setup Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: 🧪 Tests Cuarzo 4D + QAOA
        working-directory: src-tauri
        run: |
          cargo test --lib -- --nocapture 2>&1 | grep -E "(test|PASSED|FAILED|ok|error)"

      - name: 🔐 Clippy (linting de seguridad)
        working-directory: src-tauri
        run: |
          cargo clippy -- -D warnings -A clippy::needless_return

      - name: 📏 Verificar tamaño del binario móvil
        working-directory: src-tauri
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu 2>/dev/null || true
          ls -lh target/x86_64-unknown-linux-gnu/release/qeos-mobile 2>/dev/null || echo "Build en progreso"
