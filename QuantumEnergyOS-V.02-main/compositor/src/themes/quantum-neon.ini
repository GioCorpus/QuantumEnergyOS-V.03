# ═══════════════════════════════════════════════════════════════════════
#  QuantumEnergyOS — Quantum Neon Theme
#  Blue neon theme with quantum-futuristic aesthetics
#
#  Colors: Hex format (0xRRGGBB)
#  Desde Mexicali, BC — para el mundo. Kardashev 0→1
# ═══════════════════════════════════════════════════════════════════════

[theme]
name = Quantum Neon
version = 1.0.0
author = Giovanny Anthony Corpus Bernal
description = Quantum-futuristic blue neon theme for QuantumEnergyOS

[colors]
# Primary quantum blue
primary = 0x00d4ff

# Deep blue accent
secondary = 0x0099ff

# Cyan glow
accent = 0x00ffcc

# Background (dark space)
background = 0x0a0a1a

# Panel background
panel_bg = 0x1a1a2e

# Text color
text = 0xffffff

# Text secondary (dimmed)
text_secondary = 0x88ccff

# Border color
border = 0x00d4ff

# Selection highlight
selection = 0x00d4ff40

# Error color
error = 0xff3366

# Warning color
warning = 0xffcc00

# Success color
success = 0x00ff88

[particles]
# Enable floating particles
enabled = true

# Number of particles (0-100)
count = 50

# Particle size in pixels
size = 3

# Particle speed (0.1-2.0)
speed = 0.5

# Particle color
color = 0x00d4ff

# Particle glow intensity (0.0-1.0)
glow = 0.8

# Particle opacity (0.0-1.0)
opacity = 0.6

[panel]
# Panel height in pixels
height = 32

# Panel position (top, bottom, left, right)
position = top

# Panel opacity (0.0-1.0)
opacity = 0.9

# Show clock
show_clock = true

# Clock format (24h or 12h)
clock_format = 24h

# Show energy meter
show_energy = true

# Energy meter update interval (seconds)
energy_update_interval = 5

[energy_meter]
# Energy meter width in pixels
width = 120

# Energy meter height in pixels
height = 20

# Good energy threshold (percent)
good_threshold = 70

# Warning energy threshold (percent)
warning_threshold = 30

# Good color (above good_threshold)
good_color = 0x00ff88

# Warning color (between warning_threshold and good_threshold)
warning_color = 0xffcc00

# Critical color (below warning_threshold)
critical_color = 0xff3366

[windows]
# Window border width in pixels
border_width = 2

# Window border color
border_color = 0x00d4ff

# Focused window border color
focused_border_color = 0x00ffcc

# Unfocused window border color
unfocused_border_color = 0x0099ff40

# Window corner radius (0 = square corners)
corner_radius = 8

# Window shadow
shadow_enabled = true
shadow_color = 0x00000080
shadow_offset_x = 2
shadow_offset_y = 2
shadow_blur = 8

[animations]
# Enable animations
enabled = true

# Animation duration in milliseconds
duration = 200

# Animation easing (linear, ease_in, ease_out, ease_in_out)
easing = ease_out

# Window open animation (fade, slide, scale)
open_animation = fade

# Window close animation (fade, slide, scale)
close_animation = fade

# App launch wave effect
launch_wave_enabled = true
launch_wave_color = 0x00d4ff
launch_wave_duration = 300

[wallpaper]
# Wallpaper mode (stretch, fit, fill, center, tile)
mode = stretch

# Wallpaper path (relative to /usr/share/quantum-compositor/)
path = wallpaper.png

# Wallpaper opacity (0.0-1.0)
opacity = 1.0

# Aurora effect overlay
aurora_enabled = true
aurora_color = 0x00d4ff
aurora_opacity = 0.3
aurora_speed = 0.5

[fonts]
# Default font
default = monospace

# Default font size
default_size = 12

# Panel font
panel = monospace

# Panel font size
panel_size = 11

# Window title font
window_title = monospace

# Window title font size
window_title_size = 12

[cursor]
# Cursor theme
theme = default

# Cursor size
size = 24

# Cursor color (for themed cursors)
color = 0x00d4ff

[keybindings]
# Mod key (super, alt, ctrl)
mod = super

# Terminal launcher
terminal = super+return

# Application launcher
launcher = super+d

# Close window
close = super+shift+q

# Move window
move = super+leftmouse

# Resize window
resize = super+rightmouse

# Switch workspace
workspace_next = super+right
workspace_prev = super+left

# Move window to workspace
move_to_workspace = super+shift+right

[performance]
# Target FPS (30, 60, 120)
target_fps = 60

# VSync enabled
vsync = true

# Hardware acceleration (auto, software, gpu)
hardware_acceleration = auto

# Reduce animations on battery
reduce_on_battery = true

# Low power mode (disables particles)
low_power_mode = false

[accessibility]
# High contrast mode
high_contrast = false

# Large text
large_text = false

# Reduce motion
reduce_motion = false

# Screen reader support
screen_reader = false
