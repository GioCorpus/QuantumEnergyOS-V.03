# ──────────────────────────────────────────────────────────────
#  QuantumEnergyOS — CI: pip-audit auto-fix
#  Corre semanalmente y en push a main.
#  Si encuentra CVEs, abre un PR automático con el fix.
# ──────────────────────────────────────────────────────────────

name: 🛡️ pip-audit auto-fix

on:
  schedule:
    - cron: "0 7 * * 1"    # Lunes 07:00 UTC
  push:
    branches: [main]
    paths:
      - "requirements.txt"
  workflow_dispatch:         # Ejecución manual desde la UI

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-fix:
    name: Auditar y parchear dependencias
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install pip-audit safety
          pip install -r requirements.txt || true

      # ── Auditoría completa ─────────────────────────────────
      - name: 🔍 pip-audit (reporte completo)
        id: audit
        run: |
          set +e
          pip-audit \
            --format json \
            --output pip-audit-report.json \
            -r requirements.txt
          AUDIT_EXIT=$?

          # También formato markdown para el PR
          pip-audit \
            --format markdown \
            -r requirements.txt \
            > pip-audit-report.md 2>&1 || true

          echo "audit_exit=$AUDIT_EXIT" >> $GITHUB_OUTPUT
          echo "Exit code: $AUDIT_EXIT"

      # ── Auto-fix ───────────────────────────────────────────
      - name: 🔧 pip-audit --fix (aplicar parches)
        if: steps.audit.outputs.audit_exit != '0'
        run: |
          pip-audit --fix -r requirements.txt
          pip freeze \
            | grep -v "^-e" \
            | grep -v "^#" \
            > requirements-pinned.txt
          echo "✅ requirements-pinned.txt generado con versiones parcheadas"

      # ── Verificar si hay cambios ───────────────────────────
      - name: 📊 Verificar cambios en requirements
        id: check_changes
        if: steps.audit.outputs.audit_exit != '0'
        run: |
          if git diff --quiet requirements.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # ── Abrir PR automático si hay CVEs ───────────────────
      - name: 🚀 Crear PR con fixes de seguridad
        if: |
          steps.audit.outputs.audit_exit != '0' &&
          steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix(security): parchear CVEs detectados por pip-audit"
          title: "🔐 Security: pip-audit encontró vulnerabilidades — parches automáticos"
          body: |
            ## 🛡️ Reporte de pip-audit

            Este PR fue generado automáticamente por el workflow `pip-audit auto-fix`.

            ### Vulnerabilidades encontradas y corregidas

            $(cat pip-audit-report.md 2>/dev/null || echo "Ver artifacts del workflow")

            ### Próximos pasos
            - [ ] Revisar que los bump de versiones no rompan compatibilidad
            - [ ] Correr suite de tests completa
            - [ ] Aprobar y mergear si todo pasa ✅

            ---
            *Generado por `pip-audit` — QuantumEnergyOS Security CI*
          branch: "security/pip-audit-fix-${{ github.run_number }}"
          labels: |
            security
            dependencies
            automated
          reviewers: GioCorpus
          draft: false

      # ── Subir reporte como artifact ────────────────────────
      - name: 💾 Upload reporte pip-audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report-${{ github.run_number }}
          path: |
            pip-audit-report.json
            pip-audit-report.md
            requirements-pinned.txt
          retention-days: 90

      # ── Fallar CI si hay CVEs críticos sin fix ─────────────
      - name: ❌ Fallar si quedan CVEs críticos
        if: steps.audit.outputs.audit_exit != '0'
        run: |
          echo "⚠️  pip-audit detectó vulnerabilidades."
          echo "Se abrió un PR automático con los fixes."
          echo "Merge el PR antes de continuar con el deploy."
          exit 1
